exclude: ^(cache/|posts/|\.venv/|__pycache__/)
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-ast
        files: '^(shuiyuan_cache/.*\.py|scripts/.*\.py|main\.py|test\.py)$'
      - id: check-added-large-files
        args: ['--maxkb=20480']
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: debug-statements
        files: '^(shuiyuan_cache/.*\.py|scripts/.*\.py|main\.py|test\.py)$'
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.20.0
    hooks:
      - id: pyupgrade
        args: [--py312-plus]
        files: '^(shuiyuan_cache/.*\.py|scripts/.*\.py|main\.py|test\.py)$'

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.2
    hooks:
      - id: ruff
        args: [--fix]
        files: '^(shuiyuan_cache/.*\.py|scripts/.*\.py|main\.py|test\.py)$'
      - id: ruff-format
        files: '^(shuiyuan_cache/.*\.py|scripts/.*\.py|main\.py|test\.py)$'
